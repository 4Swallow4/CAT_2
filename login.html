<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
<div class="viewport">
    <div class="top-header">
        <div class="goback">
            <img src="./image/返回.png">
        </div>
    </div>

    <div class="container">
        <div class="item item-1">
            <div class="switch-1">
                <p class="logway">手机登录</p>
                <p class="logway">|</p>
                <p class="logway">账号登录</p>
            </div>

            <div class="logbox">
                <input type="password" class="input-box">
                <input type="password" class="input-box">
            </div>

            <div class="tick">
                <label for="tick-1">
                    <input type="checkbox" name="checkbox" id="tick-1">
                    <span>我已阅读并同意《任务条款》与《服务协议》</span>
                </label>
            </div>

            <!--登入按钮-->
            <div class="log-in">
                <div class="logbtn">
                    <p>登录</p>
                </div>
            </div>
        </div>
        <div class="item item-2">
            <p style="font-size: 2vh">其他登录方式</p>
            <div class="other-way">
                <img src="./image/抖音.png" alt="">
                <img src="./image/微信.png" alt="">
                <img src="./image/QQ.png" alt="">
            </div>
        </div>
    </div>


</div>
<script src="login.js">
</script>

</body>
</html>
